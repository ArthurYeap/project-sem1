<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="header.css" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    </head>
    <style>
        footer {
            position: fixed;
            height: 7rem;
            left: 0;
            bottom: 0;
            width: 100%;
            background-color: rgb(222, 132, 166);
            color: white;
            text-align: center;
            padding: 10px 0;
            z-index: 1000;
        }
        body {
            padding-bottom: 50px;
        }
        .social-icon {
            display: inline-block;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .social-icon:hover {
            transform: translateY(-5px);
        }

        .bi-facebook:hover {
            color: blueviolet !important;
        }
        .bi-twitter:hover {
            color: aqua !important;
        }
        .bi-instagram:hover {
            color: yellowgreen !important ;
        }
    </style>
    <body>
        <header>
            <a href="home.html"> <img src="P_P (1).png" class="logo" /></a>
            <ul>
                <li><a href="menu.html" style="color: azure; font-family: oswald" class="header-link">Menu</a></li>
                <li><a href="about-us.html" style="color: azure; font-family: oswald" class="header-link">About Us</a></li>
                <li><a href="contact-us.html" style="color: azure; font-family: oswald" class="header-link">Contact Us</a></li>
            </ul>
        </header>
        <div class="container">
            <h1 class="text-center">Contact Us</h1>
            <form>
                <div class="form-group">
                    <label for="fname">First Name:</label>
                    <input type="text" name="fname" class="form-control" id="fname" name="fname" placeholder="" />
                    <label for="lname">Last Name: </label>
                    <input type=" text" id="lname" class="form-control" name="lname" placeholder="" />
                </div>
                <div class="form-group">
                    <label for="phone">Phone:</label>
                    <input type="tel" name="phone" id="phone" class="form-control" />
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" class="form-control my-2" id="email" />
                </div>
                <div class="form-group">
                    <label for="message">Tell Us About Your Event</label>
                    <textarea name="message" id="message" class="form-control my-2" rows="5"></textarea>
                </div>
                <div class="form-group">
                    <label for="daytime">Date of Your Event:</label>
                    <input type="datetime-local" name="daytime" id="daytime" class="form-control" />
                </div>
                <div class="form-group">
                    <label for="location">Location:</label><br />
                    <select name="location" id="location" class="form-control">
                        <option value="penang">Penang</option>
                        <option value="kedah">Kedah</option>
                        <option value="perlis">Perlis</option>
                    </select>
                </div>
                <div class="d-flex justify-content-center mt-5">
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </div>
            </form>
        </div>

        <footer>
            <div class="container-fluid py-4">
                <div class="container text-center d-flex justify-content-center pb-2">
                    <i class="bi bi-facebook text-white px-2 social-icon"></i>
                    <i class="bi bi-twitter text-white px-2 social-icon"></i>
                    <i class="bi bi-instagram text-white px-2 social-icon"></i>
                </div>
                <div class="d-flex p-20">hi </div>
            </div>
        </footer>
    </body>
</html>
